<style>
#crn-ls-root{--ink:#16283f;--ink2:#33475f;--gold:#d99a2b;--gold-d:#b87f1c;--cream:#f7f4ee;--card:#fff;--line:#e5ddcf;--green:#2f6b3f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--cream);margin:0 auto;max-width:820px;padding:0 16px 44px;line-height:1.55;-webkit-font-smoothing:antialiased}
#crn-ls-root *{box-sizing:border-box}
.ls-back{font-size:12.5px;color:var(--gold-d);text-decoration:none;display:inline-block;margin:20px 0 6px}
.ls-eyebrow{font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-d);margin:8px 0 6px}
.ls-h1{font-size:27px;font-weight:800;letter-spacing:-.4px;margin:0 0 10px}
.ls-sec{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px 24px;margin:14px 0}
.ls-sec h2{font-size:12px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold-d);margin:0 0 10px}
.ls-sec p{font-size:14.5px;color:var(--ink2);margin:0 0 8px}
.ls-badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#8a7f6a;background:#efe9dc;border-radius:6px;padding:3px 9px;margin-bottom:10px}
.ls-cta{display:inline-block;background:var(--ink);color:#fff;text-decoration:none;font-weight:700;font-size:15px;padding:12px 26px;border-radius:11px}
.ls-cta:hover{background:#0f1d30}
.ls-notify{display:inline-block;margin-left:10px;font-size:13px;color:var(--gold-d);text-decoration:none}
.ls-foot{text-align:center;font-size:11.5px;color:#9a8f79;margin-top:24px;padding-top:16px;border-top:1px solid var(--line)}
.ls-loading{color:#8a7f6a;font-size:14px;padding:26px 4px;text-align:center}
.ls-defer{font-size:12.5px;color:#8a7f6a;border-top:1px dashed var(--line);margin-top:14px;padding-top:10px}
.ls-ceu{background:#fff8ec;border:1px solid #f0dcae;border-radius:12px;padding:16px 18px;margin:14px 0}
.ls-ceu h2{color:var(--gold-d)}
.ls-ceu .row{display:flex;align-items:flex-start;gap:10px}
.ls-ceu input{margin-top:3px;width:17px;height:17px;accent-color:var(--gold-d);flex:none}
.ls-ceu .lab{font-size:14.5px;font-weight:700;color:var(--ink)}
.ls-ceu .price{color:var(--gold-d)}
.ls-ceu p{font-size:13px;color:#6b551f;margin:6px 0 0}
.ls-ceu .ceu-cta{display:inline-block;background:var(--gold-d);color:#fff;text-decoration:none;font-weight:700;font-size:13.5px;padding:9px 18px;border-radius:10px;margin-top:12px}
.ls-ceu .ceu-cta:hover{background:#a5710f}
</style>

</div>
<script>
(function(){
  var SUPA="https://jkrzwacmslqazwwsqsar.supabase.co";
  var KEY="sb_publishable_wfblLlGRG-qcRtV-QAeHpQ_3KFy0XCR";
  var CEU_CHECKOUT="https://ken-schlenker-f253.mykajabi.com/offers/whez8Cuf/checkout"; // $25 CE Certificate add-on; purchase auto-tags contact "ceu" for CPEI tracking
  var root=document.getElementById("crn-ls-root");
  var issueId=root.getAttribute("data-issue");
  var body=document.getElementById("lsBody");
  function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function rpc(fn,payload){return fetch(SUPA+"/rest/v1/rpc/"+fn,{method:"POST",headers:{apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json"},body:JSON.stringify(payload||{})}).then(function(r){return r.json();});}
  rpc("get_issue_guide",{p_issue_id:issueId,p_level:null}).then(function(g){
    if(!g||!g.issue){body.innerHTML='<div class="ls-loading">Lesson not found.</div>';return;}
    var i=g.issue, les=g.lessons||[];
    var l=les.length?les[0]:null;
    var title=(l&&l.title)||i.title;
    var desc=(l&&l.description)||i.description||"[catalog pending]";
    var objRaw=(l&&l.objectives)||("[catalog pending]"+(i.plo?" — aligned to Program Learning Outcome "+i.plo:""));
    var hasBuy=!!(l&&l.checkout_url);
    // CEU add-on — ALWAYS offered on a 1-hour lesson (0.1 CEU). $25. CPEI-trackable; purchase carries the "ceu" tag.
    var ceuBlock='<div class="ls-ceu"><h2>Add CEU credit &mdash; $25</h2>'
      +'<div class="row"><input type="checkbox" id="ceuOpt" checked><div><span class="lab">Add an official CE credit <span class="price">($25)</span> to this 1-hour lesson</span>'
      +'<p>Adds a Certificate of Completion with <b>1 continuing-education contact hour (0.1 CEU)</b>, issued in partnership with Clinical Pastoral Education International (CPEI). Every CEU purchase is tagged for CPEI so your credit is tracked automatically.</p>'
      +'<a class="ceu-cta" id="ceuBtn" href="'+CEU_CHECKOUT+'" target="_blank" rel="noopener">Add CEU credit &mdash; $25</a></div></div></div>';
    var h="";
    h+='<p class="ls-eyebrow">CRN Lesson</p><h1 class="ls-h1">'+esc(title)+'</h1>';
    if(!hasBuy)h+='<span class="ls-badge">Coming soon</span>';
    h+='<div class="ls-sec"><h2>What this lesson covers</h2><p>'+esc(desc)+'</p></div>';
    h+='<div class="ls-sec"><h2>Learning objectives</h2><p>'+esc(objRaw)+'</p></div>';
    if(hasBuy){
      h+='<div class="ls-sec" style="text-align:center;border-top:4px solid var(--gold)"><h2 style="text-align:center">Get this lesson</h2>'
        +'<div style="font-size:30px;font-weight:800">'+esc(l.price||"")+'</div>'
        +'<p>Single-lesson access. Add the CE credit below to make it count for continuing education.</p>'
        +'<a class="ls-cta" href="'+esc(l.checkout_url)+'">Purchase this lesson</a></div>';
      h+=ceuBlock;
    } else {
      h+='<div class="ls-sec" style="text-align:center;border-top:4px solid var(--gold)"><h2 style="text-align:center">This lesson is in production</h2>'
        +'<p>Meanwhile, get full search access to LightBearer™, or explore CRN membership tiers for complete briefs, cited sources, and video lessons.</p>'
        +'<a class="ls-cta" href="https://ken-schlenker-f253.mykajabi.com/offers/UhnHkLEE/checkout">Subscribe to search &mdash; $19.99/mo</a>'
        +'<a class="ls-notify" href="mailto:podcast@chaplainresourcenetwork.com?subject=Notify%20me%3A%20'+encodeURIComponent(title)+'%20lesson">Notify me when this publishes &rarr;</a>'
        +'<p class="ls-defer">Planned next: a short contextualized preview video for this lesson (B-roll + narration; Ken\'s voice clone used sparingly so lip-sync accuracy is not an issue). Not yet built.</p></div>';
      h+=ceuBlock;
    }
    body.innerHTML=h;
    var opt=document.getElementById("ceuOpt"),btn=document.getElementById("ceuBtn");
    if(opt&&btn){opt.addEventListener("change",function(){btn.style.display=opt.checked?"":"none";});}
  }).catch(function(){body.innerHTML='<div class="ls-loading">Could not load this lesson. Please refresh.</div>';});
})();
</script>
